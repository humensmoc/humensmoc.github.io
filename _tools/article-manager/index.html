<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设计文章库 · 本地管理</title>
  <link rel="stylesheet" href="/manager.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">LOCAL EDITOR</p>
      <h1>设计文章库</h1>
      <p class="subtitle">整理链接、推荐理由与分类，确认后再发布。</p>
    </div>
    <div class="header-actions">
      <span id="dirty-indicator" class="dirty-indicator" hidden>有未保存修改</span>
    </div>
  </header>

  <section class="status-bar" aria-label="数据状态">
    <span>全部 <strong id="total-count">—</strong></span>
    <span>草稿 <strong id="draft-count">—</strong></span>
    <span>已发布 <strong id="published-count">—</strong></span>
    <span>最后保存 <strong id="updated-at">—</strong></span>
  </section>

  <p id="status-message" class="message" role="status" aria-live="polite"></p>
  <p id="error-message" class="message error" role="alert" hidden></p>

  <main class="workspace">
    <aside class="article-browser" aria-label="文章列表">
      <div class="browser-heading">
        <h2>文章</h2>
        <button id="new-article" class="button primary" type="button">新建文章</button>
      </div>
      <div class="filters">
        <label>
          搜索标题
          <input id="article-search" type="search" placeholder="输入关键词">
        </label>
        <div class="filter-row">
          <label>
            状态
            <select id="status-filter">
              <option value="all">全部</option>
              <option value="draft">草稿</option>
              <option value="published">已发布</option>
            </select>
          </label>
          <label>
            主分类
            <select id="category-filter"><option value="all">全部</option></select>
          </label>
        </div>
        <label>
          Tag
          <select id="tag-filter"><option value="all">全部</option></select>
        </label>
      </div>
      <p id="article-result-count" class="result-count"></p>
      <div id="article-list" class="article-list"></div>
    </aside>

    <section class="editor-panel" aria-labelledby="editor-title">
      <div class="editor-heading">
        <div>
          <p id="editor-state" class="eyebrow">NEW DRAFT</p>
          <h2 id="editor-title">新建文章</h2>
        </div>
        <span id="article-status" class="status-chip draft">草稿</span>
      </div>

      <form id="article-form">
        <label>
          原文链接 <span aria-hidden="true">*</span>
          <input name="url" type="url" required placeholder="https://example.com/article">
        </label>
        <label>
          标题 <span aria-hidden="true">*</span>
          <input name="title" required maxlength="180" placeholder="手动填写文章标题">
        </label>
        <label>
          推荐理由 <span aria-hidden="true">*</span>
          <textarea name="recommendation" required rows="8" placeholder="为什么保留并推荐这篇文章？它适合谁、能解决什么问题？"></textarea>
        </label>
        <div class="field-control">
          <label id="category-picker-label">主分类 <span aria-hidden="true">*</span></label>
          <div id="category-picker" class="taxonomy-picker" data-kind="category">
            <button class="taxonomy-trigger" type="button" aria-expanded="false" aria-controls="category-dropdown" aria-labelledby="category-picker-label category-summary">
              <span id="category-summary">请选择主分类</span>
              <span class="taxonomy-chevron" aria-hidden="true"></span>
            </button>
            <div id="category-dropdown" class="taxonomy-dropdown" hidden>
              <div class="taxonomy-toolbar">
                <input class="taxonomy-search" type="search" placeholder="搜索分类" aria-label="搜索分类">
                <div class="taxonomy-add-form">
                  <input name="name" placeholder="新分类名称" aria-label="新分类名称">
                  <button class="button primary" type="button">添加</button>
                </div>
              </div>
              <p class="taxonomy-help">左键选择分类，右键可重命名或删除。</p>
              <div class="taxonomy-list"></div>
              <div class="taxonomy-editor" hidden></div>
            </div>
            <input id="article-category" name="categoryId" type="hidden">
          </div>
        </div>

        <div class="field-control">
          <label id="tag-picker-label">Tag</label>
          <div id="tag-picker" class="taxonomy-picker" data-kind="tag">
            <button class="taxonomy-trigger" type="button" aria-expanded="false" aria-controls="tag-dropdown" aria-labelledby="tag-picker-label tag-summary">
              <span id="tag-summary">未选择 Tag</span>
              <span class="taxonomy-chevron" aria-hidden="true"></span>
            </button>
            <div id="tag-dropdown" class="taxonomy-dropdown" hidden>
              <div class="taxonomy-toolbar">
                <input class="taxonomy-search" type="search" placeholder="搜索 Tag" aria-label="搜索 Tag">
                <div class="taxonomy-add-form">
                  <input name="name" placeholder="新 Tag 名称" aria-label="新 Tag 名称">
                  <button class="button primary" type="button">添加</button>
                </div>
              </div>
              <p class="taxonomy-help">左键切换 Tag，右键可重命名或删除。</p>
              <div class="taxonomy-list"></div>
              <div class="taxonomy-editor" hidden></div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="button primary" type="submit">保存</button>
          <button id="publish-toggle" class="button publish" type="button">发布</button>
          <button id="delete-article" class="button danger" type="button" disabled>删除文章</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="/manager.js"></script>
</body>
</html>
